<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Weather</title><script defer="defer" src="main.js"></script></head><body><form method="dialog"><img src="54ff7732bb1a5ff166c6.svg" alt="search icon" width="24" height="24"/> <input type="search" id="location-search" name="location-search" class="location-search" placeholder="Search for a location..."/> <button type="submit" class="search-button">Search</button></form><div class="warnings hidden"><div class="errors hidden"><img src="bf468b98f99fe3cb600c.svg" alt="error icon" width="24" height="24"/><p class="headline"></p><p class="description"></p></div><div class="alerts hidden"><img src="243a2d02c346a85940fc.svg" alt="alert icon" width="24" height="24"/><p class="headline"></p><p class="description"></p></div></div><div class="introduction"><img class="logo" src="9342e375ab3da73ddea5.svg" alt="cloud logo" width="24" height="24"/><h3 class="app-name">Weather Search</h3><p class="description">Search for any location to get detailed weather information including temperature, wind conditions, visibility, and weather alerts.</p><p class="instruction"><img class="search-icon" src="54ff7732bb1a5ff166c6.svg" alt="search icon" width="24" height="24"/><span class="text">Start by entering a city name or location above</span></p></div><div class="weather hidden"><div class="temperature-toggle"><input type="radio" name="temperature-unit" id="unit-fahrenheit" value="fahrenheit" checked="checked"/> <label for="unit-fahrenheit" tabindex="0">°F</label> <input type="radio" name="temperature-unit" id="unit-celsius" value="celsius"/> <label for="unit-celsius" tabindex="0">°C</label></div><div class="primary-info"><h2 class="location"></h2><h1 class="temperature"></h1><p class="description"></p><div class="range-temperature"><p class="min-temp"><img src="1179ba1f88f4f2c17df6.svg" alt="low temp icon" width="24" height="24"/><span></span></p><p class="max-temp"><img src="c4006b7f237fa9cae93b.svg" alt="high temp icon" width="24" height="24"/><span></span></p></div></div><div class="secondary-info"><div class="wind-section"><img src="9a5e68987c5e27b759b6.svg" alt="wind icon" width="24" height="24"/><span class="name">Wind</span><p class="info"></p></div><div class="visibility-section"><img src="b8b1612f3981992f76fa.svg" alt="visibility icon" width="24" height="24"/><span class="name">Visibility</span><p class="info"></p></div><div class="precipitation-section"><img src="105e4d8334493ba05685.svg" alt="precipitation icon" width="24" height="24"/><span class="name">Precipitation</span><p class="info"></p></div></div></div></body></html>
